<!doctype html>
<html lang="fr">
  <head>
    <title>Facturini — Bientôt disponible</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }

      body {
        background: #f9fafb;
        color: #111827;
        display: grid;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
        place-items: center;
        padding: 2rem;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        text-align: center;
        max-width: 480px;
      }

      .logo {
        font-size: 1.75rem;
        font-weight: 700;
        color: #4f46e5;
        letter-spacing: -0.03em;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #111827;
        letter-spacing: -0.02em;
      }

      p {
        font-size: 1rem;
        color: #6b7280;
        line-height: 1.6;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: #eef2ff;
        color: #4f46e5;
        font-size: 0.8rem;
        font-weight: 500;
        padding: 0.3rem 0.75rem;
        border-radius: 9999px;
      }

      .dot {
        width: 6px;
        height: 6px;
        background: #4f46e5;
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f1f5f9; }
        h1 { color: #f1f5f9; }
        p { color: #94a3b8; }
        .badge { background: #1e1b4b; color: #818cf8; }
        .dot { background: #818cf8; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">Facturini</div>
      <div class="badge">
        <span class="dot"></span>
        En construction
      </div>
      <h1>Bientôt disponible</h1>
      <p>Facturini est une application de facturation B2B pour les indépendants et les petites entreprises. Le lancement arrive très bientôt.</p>
    </main>
  </body>
</html>
