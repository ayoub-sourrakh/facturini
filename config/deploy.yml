service: facturini

image: ayoubsourrakh/facturini

servers:
  web:
    - 51.15.98.213

proxy:
  ssl: true
  host: facturini.fr

registry:
  server: docker.io
  username: ayoubsourrakh
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - SMTP_USER_NAME
    - SMTP_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: false
    DB_HOST: facturini-db
    MAINTENANCE_MODE: false

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "facturini_storage:/rails/storage"

asset_path: /rails/public/assets

healthcheck:
  path: /up
  interval: 5s
  timeout: 60s

builder:
  arch: amd64

accessories:
  db:
    image: postgres:17
    host: 51.15.98.213
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: facturini
        POSTGRES_DB: facturini_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data